version: "3.8"

# ============================================================
# Pmais Eventos — stack completa
# postgres + backend (FastAPI) + worker (scheduler) + frontend (Next.js)
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pmais
      POSTGRES_USER: pmais
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pmais}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmais"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://pmais:${POSTGRES_PASSWORD:-pmais}@postgres:5432/pmais
      JWT_SECRET: ${JWT_SECRET:-change-me}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Pmais Eventos <noreply@pmaiseventos.com>}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    ports:
      - "8000:8000"
    volumes:
      - ./files:/files

  worker:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://pmais:${POSTGRES_PASSWORD:-pmais}@postgres:5432/pmais
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Pmais Eventos <noreply@pmaiseventos.com>}
      TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    command: ["python", "-m", "app.scheduler"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
